version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: fieldcheck-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: fieldcheck
      MYSQL_USER: fieldcheck
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fieldcheck123}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
      - ./mysql/conf:/etc/mysql/conf.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fieldcheck-network

  # Spring Boot 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fieldcheck-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fieldcheck?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: fieldcheck
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-fieldcheck123}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key-for-jwt-token-generation-2024}
      AES_SECRET: ${AES_SECRET:-fieldcheck-aes-key}
    ports:
      - "8080:8080"
    volumes:
      - backend_logs:/app/logs
      - backend_reports:/app/reports
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - fieldcheck-network

  # Vue 前端 (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fieldcheck-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - fieldcheck-network

networks:
  fieldcheck-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  backend_logs:
    driver: local
  backend_reports:
    driver: local
