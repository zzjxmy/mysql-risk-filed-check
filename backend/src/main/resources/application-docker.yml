spring:
  profiles: docker
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/fieldcheck?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:fieldcheck}
    password: ${SPRING_DATASOURCE_PASSWORD:fieldcheck123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

jwt:
  secret: ${JWT_SECRET:your-super-secret-key-for-jwt-token-generation-2024}
  expiration: 86400000

aes:
  secret: ${AES_SECRET:fieldcheck-aes-key}

logging:
  level:
    root: INFO
    com.fieldcheck: INFO
  file:
    name: /app/logs/fieldcheck.log

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
