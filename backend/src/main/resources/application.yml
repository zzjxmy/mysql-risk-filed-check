server:
  port: 8080

spring:
  application:
    name: mysql-field-capacity-check

  datasource:
    url: jdbc:mysql://localhost:3306/fieldcheck?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always
    overwrite-existing-jobs: true

  mail:
    host: smtp.example.com
    port: 587
    username: 
    password: 
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# JWT Configuration
jwt:
  secret: YourSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong123456789
  expiration: 86400000  # 24 hours in milliseconds

# AES Encryption Key for database passwords
encryption:
  aes-key: AES256BitKeyForPasswordEncryption!

# Application specific config
app:
  log-path: ./logs/executions
  max-concurrent-tasks: 5

logging:
  level:
    root: INFO
    com.fieldcheck: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
